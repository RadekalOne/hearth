name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  cli:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm pack --dry-run

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: cp .env.example .env
      - run: docker compose config --quiet
      - name: Validate public Traefik overlays
        env:
          HEARTH_PUBLIC_ELEMENT_HOST: hearth.example.test
          HEARTH_PUBLIC_MATRIX_HOST: hearth-matrix.example.test
          HEARTH_PUBLIC_MEMORY_HOST: hearth-memory.example.test
          HEARTH_MEMORY_ADMIN_TOKEN: ci-admin-token
        run: docker compose -f docker-compose.yml -f docker-compose.expose.yml -f docker-compose.expose-memory.yml config --quiet
