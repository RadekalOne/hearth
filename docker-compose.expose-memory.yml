# Optional overlay: publish the memory service behind Traefik/TLS.
# ONLY safe when HEARTH_MEMORY_ADMIN_TOKEN is set (auth enabled) — the CLI
# layers this file only when HEARTH_PUBLIC_MEMORY_HOST is configured.
services:
  memory:
    labels:
      traefik.enable: "true"
      traefik.http.routers.hearth-memory.entrypoints: websecure
      traefik.http.routers.hearth-memory.rule: Host(`${HEARTH_PUBLIC_MEMORY_HOST:?set in .env}`)
      traefik.http.routers.hearth-memory.tls.certresolver: ${HEARTH_CERTRESOLVER:-letsencrypt}
      traefik.http.routers.hearth-memory.service: hearth-memory-svc
      traefik.http.services.hearth-memory-svc.loadbalancer.server.port: "8010"
